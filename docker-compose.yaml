version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: docs_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: docs_api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/company_docs
      - JWT_SECRET=M1nh@S3cr3tK3y
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: docs_web
    ports:
      - "9000:9000" # Assumindo um build estático servido via Nginx
    depends_on:
      - backend

volumes:
  mongo_data: